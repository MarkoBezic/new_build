<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>New Build</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; }
      canvas { display: block; }

      /* ── Pause / start overlay ──────────────────────────────────── */
      #overlay {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: rgba(0, 0, 0, .72);
        color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        cursor: pointer;
        z-index: 20;
        user-select: none;
      }
      #overlay h1 {
        font-size: clamp(1.6rem, 4vw, 2.6rem);
        font-weight: 700;
        letter-spacing: .06em;
        text-transform: uppercase;
        margin-bottom: .35em;
      }
      #overlay .subtitle {
        font-size: 1.05rem;
        opacity: .65;
        margin-bottom: 2em;
      }
      #overlay .keys {
        display: grid;
        grid-template-columns: repeat(2, auto);
        gap: .3em 1.6em;
        font-size: .78rem;
        opacity: .45;
        letter-spacing: .07em;
        text-transform: uppercase;
      }
      #overlay .click-hint {
        margin-top: 2.4em;
        font-size: .9rem;
        opacity: .5;
        animation: pulse 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: .35; }
        50%       { opacity: .7;  }
      }

      /* ── Crosshair ──────────────────────────────────────────────── */
      #crosshair {
        display: none;
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        pointer-events: none;
        z-index: 20;
      }
      #crosshair::before,
      #crosshair::after {
        content: '';
        position: absolute;
        background: rgba(255, 255, 255, .85);
        border-radius: 1px;
      }
      #crosshair::before { width: 14px; height: 2px; top: -1px; left: -7px; }
      #crosshair::after  { width: 2px; height: 14px; top: -7px; left: -1px; }

      /* ── Corner HUD ─────────────────────────────────────────────── */
      #hud {
        position: fixed;
        bottom: 12px; left: 14px;
        color: rgba(255, 255, 255, .4);
        font: 11px/1.8 monospace;
        pointer-events: none;
        z-index: 10;
      }

      /* ── Mobile hint switching ───────────────────────────────────── */
      .mobile-hints  { display: none; }
      .desktop-hints { display: grid; }
      .tap-hint      { display: none; }
      .click-hint-text { display: inline; }

      @media (pointer: coarse) {
        .mobile-hints       { display: grid; }
        .desktop-hints      { display: none; }
        .tap-hint           { display: block; }
        .click-hint-text    { display: none; }

        /* Bottom safe area for notch phones */
        #hud { bottom: max(12px, env(safe-area-inset-bottom)); }
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <h1>Explore</h1>
      <p class="subtitle">Take a look around</p>
      <div class="keys desktop-hints">
        <span>W A S D</span><span>Move</span>
        <span>Shift</span><span>Sprint</span>
        <span>Space</span><span>Jump</span>
        <span>Mouse</span><span>Look</span>
        <span>ESC</span><span>Pause</span>
        <span>M</span><span>Map</span>
      </div>
      <div class="keys mobile-hints">
        <span>Left thumb</span><span>Move</span>
        <span>Right thumb</span><span>Look</span>
        <span>JUMP button</span><span>Jump</span>
        <span>MAP button</span><span>Map</span>
      </div>
      <p class="click-hint">
        <span class="click-hint-text">Click anywhere to begin</span>
        <span class="tap-hint">Tap anywhere to begin</span>
      </p>
    </div>

    <div id="crosshair"></div>

    <div id="hud">Phase 4 &mdash; Parking + site</div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
